    <title>WEPP España | German Technology</title>
    <script>
      // Handle libraries that try to overwrite window.fetch
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('Attempted to overwrite window.fetch - ignored.'); },
            configurable: true // Allow re-definition if absolutely necessary by other shims
          });
        } catch (e) {}
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
